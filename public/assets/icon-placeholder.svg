<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
            <defs>
                <!-- Máscara para crear el espacio en blanco exacto entre el rayo y la campana -->
                <mask id="recorte-rayo">
                    <rect width="200" height="200" fill="white" />
                    <!-- El stroke-width de 12 define el grosor de la línea blanca separadora -->
                    <polygon points="116,24 56,92 104,92 64,160 144,72 96,72" fill="black" stroke="black" stroke-width="12" stroke-linejoin="miter" stroke-miterlimit="10"/>
                </mask>
            </defs>

            <!-- Campana Base (Azul Oscuro) con la máscara de recorte aplicada -->
            <g mask="url(#recorte-rayo)" fill="#0f4c81">
                <!-- Cuerpo de la campana (curvas simétricas matemáticas) -->
                <path d="M 100 36
                         C 76 36, 64 52, 64 84
                         C 64 120, 40 132, 32 144
                         C 28 148, 30 152, 36 152
                         L 164 152
                         C 170 152, 172 148, 168 144
                         C 160 132, 136 120, 136 84
                         C 136 52, 124 36, 100 36 Z" />
                
                <!-- Badajo inferior (semicírculo) -->
                <path d="M 80 152 v 2 a 20 16 0 0 0 40 0 v -2 Z" />
            </g>

            <!-- Rayo Frontal (Celeste) -->
            <polygon points="116,24 56,92 104,92 64,160 144,72 96,72" fill="#1ea0e4" />
        </svg>
